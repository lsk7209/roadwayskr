name: Sync TourAPI

on:
  schedule:
    # 04:00 KST = 19:00 UTC (전날)
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        required: false
        default: "incremental"
        type: choice
        options: [incremental, full]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run sync
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          TOUR_API_SERVICE_KEY: ${{ secrets.TOUR_API_SERVICE_KEY }}
        run: |
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            pnpm sync:tourapi:full
          else
            pnpm sync:tourapi
          fi
